name: build-image

on:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          target: novnc
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cockpit-tools:novnc-latest
            ghcr.io/${{ github.repository_owner }}/cockpit-tools:novnc-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max